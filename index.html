<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>潍坊好吃好玩翻页地图</title>
    <link rel="stylesheet" href="./styles.css?v=flipbook-20260511" />
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
  </head>
  <body>
    <main class="flipbook-app">
      <header class="hud">
        <div class="brand">
          <div>
            <p>WEIFANG FLIPBOOK MAP</p>
            <h1>潍坊好吃好玩翻页地图</h1>
          </div>
          <span id="pageLabel">封面</span>
        </div>

        <div class="hud-row">
          <label class="search-box" for="searchInput">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="地点、区县、标签" />
          </label>
          <button class="icon-action" id="prevButton" type="button" title="上一页">←</button>
          <button class="icon-action" id="nextButton" type="button" title="下一页">→</button>
          <button class="icon-action" id="editButton" type="button" aria-pressed="false">编辑</button>
          <div class="page-counter" id="pageCounter">01 / 01</div>
        </div>

        <div class="filters" id="filters" aria-label="地点分类"></div>
      </header>

      <section class="book-stage" aria-label="翻页地图">
        <div class="book-shell">
          <div class="book" id="book" aria-live="polite"></div>
        </div>
      </section>

      <aside class="edit-drawer" id="editDrawer" aria-label="布局编辑" hidden>
        <strong>布局编辑</strong>
        <span>拖动总览页上的路牌，只改翻页地图里的布局，不改真实经纬度。</span>
        <textarea id="layoutOutput" readonly></textarea>
      </aside>

      <div class="hint">拖住书页右下角翻页，点击总览页路牌可跳转</div>
    </main>

    <script src="./places.js?v=flipbook-20260511"></script>
    <script src="./app.js?v=flipbook-20260511"></script>
  </body>
</html>
