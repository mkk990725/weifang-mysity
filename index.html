<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>潍坊好吃好玩地图</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="map-app">
      <div id="map" aria-label="潍坊好吃好玩地图">
        <div class="fallback-tiles" id="fallbackTiles" aria-hidden="true"></div>
        <div class="tile-attribution">© AutoNavi</div>
      </div>

      <section class="top-panel" aria-label="地图工具">
        <header class="brand">
          <div>
            <p>Weifang City Map</p>
            <h1>潍坊好吃好玩地图</h1>
          </div>
          <span>已核验 5</span>
        </header>

        <div class="tool-row">
          <label class="search-box">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="地点、区域、标签" />
          </label>
          <button class="icon-action" id="threeDButton" type="button" aria-pressed="false">3D</button>
          <button class="icon-action" id="tourButton" type="button" aria-pressed="false">巡游</button>
        </div>

        <div class="filters" id="filters" aria-label="地点分类"></div>
      </section>

      <section class="map-note" aria-label="数据说明">
        <strong>只推荐已核验地点</strong>
        <span>公开来源、经营信息、地址电话和开放时间优先；不做拉踩。</span>
      </section>

      <section class="place-strip" id="placeList" aria-label="地点列表"></section>

      <aside class="detail-drawer" id="detailPanel" aria-live="polite"></aside>
    </main>

    <script src="./config.js"></script>
    <script src="./places.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
